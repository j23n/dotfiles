# Clipboard
set -g set-clipboard on
set -g allow-passthrough on
set -g mouse on
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Reduce escape delay (helps with vim/helix)
set -g escape-time 10


# Status bar (Flexoki Dark bg, light text)
set -g status-style "bg=#100F0F,fg=#CECDC3"
set -g status-left "#{?client_prefix,#[fg=#100F0F,bg=#D0A215,bold] ^ ,#[fg=#D0A215,bold] }#S "
set -g status-right "#{?window_zoomed_flag,#[fg=#AF3029,bold] Z ,}#[fg=#878580]#h  up #(awk '{d=int($1/86400); h=int($1%%86400/3600); m=int($1%%3600/60); if(d>0) printf \"%%dd%%dh\",d,h; else if(h>0) printf \"%%dh%%dm\",h,m; else printf \"%%dm\",m}' /proc/uptime)  %b %d %H:%M "
set -g status-left-length 30
set -g status-right-length 60

# Window tabs
set -g window-status-format "#[fg=#878580] #I:#W "
set -g window-status-current-format "#[fg=#FFFCF0,bold] #I:#W "

# Pane borders - subtle inactive, strong active
set -g pane-border-style "fg=#E6E4D9"
set -g pane-active-border-style "fg=#205EA6"
set -g pane-border-lines heavy 

# Dim inactive panes
set -g window-style "bg=#E6E4D9"
set -g window-active-style "bg=#FFFCF0"

