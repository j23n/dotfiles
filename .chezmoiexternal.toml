{{ $arch := "x86_64" -}}
{{ if eq .chezmoi.arch "arm64" -}}
{{ $arch = "aarch64" -}}
{{ end -}}
{{ $os := "linux" -}}
{{ if eq .chezmoi.os "darwin" -}}
{{ $os = "macos" -}}
{{ end -}}

# ── Personal project repos ────────────────────────────────────────────────────
# For projects not on any package manager. Uncomment and set the URL to have
# chezmoi manage cloning and updating (runs on `chezmoi update`).
#
# [".local/share/px"]
#     type = "git-repo"
#     url = "git@github.com:you/px.git"
#     refreshPeriod = "168h"

# ── External binaries ─────────────────────────────────────────────────────────
[".local/lib/helix"]
    type = "archive"
    url = "https://github.com/helix-editor/helix/releases/download/{{ .helix.version }}/helix-{{ .helix.version }}-{{ $arch }}-{{ $os }}.tar.xz"
    stripComponents = 1
